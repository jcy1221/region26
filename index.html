        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);

            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

        .glass-card:hover {
            border-color: #93c5fd;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .expand-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }
        .expand-content.open {
            grid-template-rows: 1fr;
        }
        .expand-inner {
            overflow: hidden;
        }
    </style>

                const metroCands = getCandidates(site.metro);
                const basicCands = getCandidates(site.basic);

                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl bg-white overflow-hidden cursor-pointer';
                card.onclick = function() {
                    const content = this.querySelector('.expand-content');
                    content.classList.toggle('open');
                };

                const basicElectionSummaryHTML = site.basic === "해당없음" 
                    ? `<span class="text-sm text-slate-400 italic">기초단체장 선거 없음 (단층제/행정시)</span>`
                    : `
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                        <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-md text-sm font-semibold w-full sm:w-40 whitespace-nowrap text-center shrink-0 border border-indigo-100">${site.basic}</span>
                        <div class="text-sm tracking-tight flex flex-wrap items-center">
                            ${renderCandidateLine(basicCands)}
                        </div>
                    </div>
                    `;

                card.innerHTML = `
                    <div class="p-5 flex flex-col lg:flex-row justify-between gap-6">
                        <!-- Left: 사업장 정보 -->
                        <div class="flex flex-col justify-center lg:w-80 shrink-0">
                            <div class="text-xl font-bold text-slate-900 mb-1 flex items-center gap-2">
                                <span class="text-sm font-semibold px-2 py-0.5 rounded ${site.company === '유진' ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-600'}">${site.company}</span>
                                ${site.name}
                            </div>
                            <div class="text-sm text-slate-500 flex items-center gap-1">
                                <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                <span class="break-keep">${site.address}</span>
                            </div>
                        </div>

                        <!-- Right: 선거 정보 -->
                        <div class="flex-grow flex flex-col gap-3 lg:pl-6 lg:border-l border-slate-100 justify-center min-w-0">
                            <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                                <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-md text-sm font-semibold w-full sm:w-40 whitespace-nowrap text-center shrink-0 border border-blue-100">${site.metro}</span>
                                <div class="text-sm tracking-tight flex flex-wrap items-center">
                                    ${renderCandidateLine(metroCands)}
                                </div>
                            </div>
                            ${basicElectionSummaryHTML}
                        </div>
                    </div>

                    <!-- Expandable Content (후보자별 맞춤형 공약) -->
                    <div class="expand-content bg-slate-50 border-t border-slate-100">
                        <div class="expand-inner">
                            <div class="p-5 flex flex-col gap-6">
                                
                                <!-- 광역단체장 공약 섹션 -->
                                <div>
                                    <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2 border-l-4 border-blue-500 pl-2">
                                        ${site.metro} 후보 공약 <span class="text-xs font-normal text-slate-400 ml-1">(건설/부동산/개발 중심)</span>
                                    </h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${renderPledgesHTML(metroCands)}
                                    </div>
                                </div>

                                <!-- 기초단체장 공약 섹션 -->
                                ${site.basic !== "해당없음" ? `
                                <div>
                                    <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2 border-l-4 border-indigo-500 pl-2">
                                        ${site.basic} 후보 공약
                                    </h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${renderPledgesHTML(basicCands)}
                                    </div>
                                </div>
                                ` : ''}
                                
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 탭 버튼 클릭 이벤트 처리 함수
        function updateTabs(selectedCompany) {
            currentCompany = selectedCompany;
            
            const btnEugene = document.getElementById('tab-eugene');
            const btnTongyang = document.getElementById('tab-tongyang');

            if (selectedCompany === '유진') {
                btnEugene.className = "flex-1 md:w-32 py-2 text-sm font-bold rounded-lg bg-white text-blue-700 shadow-sm transition-all border border-slate-100";
                btnTongyang.className = "flex-1 md:w-32 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all border border-transparent";
            } else {
                btnTongyang.className = "flex-1 md:w-32 py-2 text-sm font-bold rounded-lg bg-white text-blue-700 shadow-sm transition-all border border-slate-100";
                btnEugene.className = "flex-1 md:w-32 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all border border-transparent";
            }

            // 탭을 바꿨을 때는 검색어를 유지하며 렌더링
            renderList(document.getElementById('searchInput').value);
        }

        // 초기 렌더링
        renderList();

        // 이벤트 리스너 등록
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        document.getElementById('tab-eugene').addEventListener('click', () => updateTabs('유진'));
        document.getElementById('tab-tongyang').addEventListener('click', () => updateTabs('동양'));

    </script>
</body>
</html>
