            grid-template-rows: 1fr;
        }

            { name: "서인천", address: "인천광역시 서구 약암로 1 (오류동)", metro: "인천광역시장", basic: "인천 서구청장" },
            { name: "송도", address: "인천광역시 남동구 에코중앙로 11", metro: "인천광역시장", basic: "인천 남동구청장" },
            { name: "서서울", address: "경기도 고양시 덕양구 통일로 493번길 35", metro: "경기도지사", basic: "고양시장" },
            { name: "동서울", address: "경기도 남양주시 진건읍 진관산단로 59번길 21", metro: "경기도지사", basic: "남양주시장" },
            { name: "남양주", address: "경기도 포천시 내촌면 금강로 2199-43", metro: "경기도지사", basic: "포천시장" },
            { name: "동두천", address: "경기도 동두천시 갈마지길 205 (상패동)", metro: "경기도지사", basic: "동두천시장" },
            { name: "춘천", address: "강원도 춘천시 동산면 영서로 915", metro: "강원특별자치도지사", basic: "춘천시장" },
            { name: "수지", address: "경기도 용인시 처인구 모현읍 포은대로 890", metro: "경기도지사", basic: "용인시장" },
            { name: "광주", address: "경기도 광주시 오포읍 문현로 91-44", metro: "경기도지사", basic: "광주시장" },
            { name: "안산", address: "경기도 안산시 상록구 반월천북길 188", metro: "경기도지사", basic: "안산시장" },
            { name: "수원", address: "경기도 화성시 향남읍 서봉로 720", metro: "경기도지사", basic: "화성시장" },
            { name: "지구", address: "경기도 화성시 향남읍 발안로464번길 25-41", metro: "경기도지사", basic: "화성시장" },
            { name: "평택", address: "경기도 안성시 원곡면 청원로 1752-55", metro: "경기도지사", basic: "안성시장" },
            { name: "안성", address: "경기도 안성시 대덕면 만세로 145", metro: "경기도지사", basic: "안성시장" },
            { name: "수원A", address: "경기도 화성시 향남읍 서봉로 714", metro: "경기도지사", basic: "화성시장" },
            { name: "파주석산", address: "경기도 파주시 법원읍 술이홀로1282번길 295", metro: "경기도지사", basic: "파주시장" },
            { name: "모래부두", address: "인천광역시 중구 서해대로 7", metro: "인천광역시장", basic: "인천 중구청장" },
            { name: "천안", address: "충청남도 천안시 동남구 풍세면 풍세로 550", metro: "충청남도지사", basic: "천안시장" },
            { name: "당진", address: "충청남도 당진시 고대면 고대로 158", metro: "충청남도지사", basic: "당진시장" },
            { name: "공주석산", address: "충청남도 공주시 이인면 검바위로 95-39", metro: "충청남도지사", basic: "공주시장" },
            { name: "세종", address: "세종특별자치시 금남면 안금로 351-43", metro: "세종특별자치시장", basic: "해당없음" },
            { name: "K광주", address: "광주광역시 광산구 풍영정길 201", metro: "광주광역시장", basic: "광주 광산구청장" },
            { name: "나주", address: "전라남도 나주시 남평읍 교원교촌길 22-104", metro: "전라남도지사", basic: "나주시장" },
            { name: "군산", address: "전라북도 군산시 외항안길 210", metro: "전북특별자치도지사", basic: "군산시장" }
        ];

        // 리스트 요약용 헬퍼 (상단 카드용)
        function renderCandidateLine(candidates) {
            return candidates.map(c => 
                `<span class="whitespace-nowrap"><span class="${getPartyColor(c.party)} font-bold">[${c.party}]</span> <span class="font-medium ${c.name === '공천중' ? 'text-slate-400' : 'text-slate-800'}">${c.name}</span></span>`
            ).join('<span class="text-slate-200 mx-2">|</span>');
        }

        // 공약 상세 렌더링 헬퍼 (아코디언용)
        function renderPledgesHTML(candidates) {
            return candidates.map(c => {
                // 공약이 없거나 공천중이면 빈칸(공란) 처리
                if (!c.pledges || c.pledges.length === 0 || c.name === '공천중') {
                    return `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm opacity-60">
                        <div class="mb-2 border-b border-slate-100 pb-2 flex justify-between items-end">
                            <div><span class="${getPartyColor(c.party)} font-bold text-sm">${c.party}</span> <span class="font-bold text-slate-800 ml-1">${c.name}</span></div>
                        </div>
                        <div class="text-sm text-slate-400 h-8 flex items-center justify-center italic">확인된 건설/개발 관련 공약 없음</div>
                    </div>`;
                }

                // 공약이 있는 경우
                const pledgeItems = c.pledges.map(p => `<li>${p}</li>`).join('');
                return `
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <div class="mb-2 border-b border-slate-100 pb-2 flex justify-between items-end">
                        <div><span class="${getPartyColor(c.party)} font-bold text-sm">${c.party}</span> <span class="font-bold text-slate-800 ml-1">${c.name}</span></div>
                        ${c.source ? `<span class="text-[10px] text-slate-400">${c.source}</span>` : ''}
                    </div>
                    <ul class="text-sm text-slate-700 list-disc pl-4 space-y-1.5">
                        ${pledgeItems}
                    </ul>
                </div>`;
            }).join('');
        }

        const container = document.getElementById('dashboard-container');

        // 리스트 렌더링 함수
        function renderList(filterText = "") {
            container.innerHTML = "";
            const filtered = factories.filter(f => f.name.includes(filterText));

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">검색된 사업장이 없습니다.</div>`;
                return;
            }

            filtered.forEach((site) => {
                const metroCands = getCandidates(site.metro);
                const basicCands = getCandidates(site.basic);

                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl bg-white overflow-hidden cursor-pointer';
                card.onclick = function() {
                    const content = this.querySelector('.expand-content');
                    content.classList.toggle('open');
                };

                const basicElectionSummaryHTML = site.basic === "해당없음" 
                    ? `<span class="text-sm text-slate-400 italic">기초단체장 선거 없음 (단층제)</span>`
                    : `
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                        <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-md text-sm font-semibold w-28 text-center shrink-0 border border-indigo-100">${site.basic}</span>
                        <div class="text-sm tracking-tight flex flex-wrap items-center">
                            ${renderCandidateLine(basicCands)}
                        </div>
                    </div>
                    `;

                card.innerHTML = `
                    <div class="p-5 flex flex-col lg:flex-row justify-between gap-6">
                        <!-- Left: 사업장 정보 -->
                        <div class="flex flex-col justify-center min-w-[250px]">
                            <div class="text-xl font-bold text-slate-900 mb-1 flex items-center gap-2">
                                ${site.name}
                            </div>
                            <div class="text-sm text-slate-500 flex items-center gap-1">
                                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                ${site.address || site.정주}
                            </div>
                        </div>

                        <!-- Right: 선거 정보 -->
                        <div class="flex-grow flex flex-col gap-3 lg:pl-6 lg:border-l border-slate-100 justify-center">
                            <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                                <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-md text-sm font-semibold w-28 text-center shrink-0 border border-blue-100">${site.metro}</span>
                                <div class="text-sm tracking-tight flex flex-wrap items-center">
                                    ${renderCandidateLine(metroCands)}
                                </div>
                            </div>
                            ${basicElectionSummaryHTML}
                        </div>
                    </div>

                    <!-- Expandable Content (후보자별 맞춤형 공약) -->
                    <div class="expand-content bg-slate-50 border-t border-slate-100">
                        <div class="expand-inner">
                            <div class="p-5 flex flex-col gap-6">
                                
                                <!-- 광역단체장 공약 섹션 -->
                                <div>
                                    <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2 border-l-4 border-blue-500 pl-2">
                                        ${site.metro} 후보 공약 <span class="text-xs font-normal text-slate-400 ml-1">(건설/부동산/개발 중심)</span>
                                    </h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${renderPledgesHTML(metroCands)}
                                    </div>
                                </div>

                                <!-- 기초단체장 공약 섹션 -->
                                ${site.basic !== "해당없음" ? `
                                <div>
                                    <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2 border-l-4 border-indigo-500 pl-2">
                                        ${site.basic} 후보 공약
                                    </h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${renderPledgesHTML(basicCands)}
                                    </div>
                                </div>
                                ` : ''}
                                
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 초기 렌더링
        renderList();

        // 검색 이벤트 리스너
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderList(e.target.value);
        });
    </script>
</body>
</html>
